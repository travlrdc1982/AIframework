<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>American Ideology</title>
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@400&family=Playfair+Display:wght@600&family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: transparent; }
#wrap { width: 100%; max-width: 1400px; margin: 0 auto; }
#diagram { position: relative; width: 100%; padding-bottom: 78.57%; background: rgba(255,255,255,0.6); }
#diagram > * { position: absolute; }

/* z-index layers */
#flag-circle { z-index: 1; }
#ai-bubble { z-index: 10; pointer-events: none; }
#arrow-blue, #arrow-red { z-index: 2; }
.cardinal { z-index: 3; cursor: pointer; border-radius: 6px; display: flex; align-items: center; opacity: 0.5; transition: opacity 0.3s ease, box-shadow 0.3s ease; }

.fringe { z-index: 4; cursor: pointer; border-radius: 30px; display: flex; align-items: center; justify-content: center; opacity: 0.82; transition: opacity 0.4s; }
.t-vert, .t-horiz { z-index: 5; }

/* Cardinal boxes */
.cardinal span {
  font-family: "Playfair Display", serif; font-weight: 600;
  color: #fff; font-size: 15px; line-height: 1.25; display: block; width: 100%;
}
#rep, #fed { background: #041f3e; justify-content: center; }
#ci  { background: #95192f; justify-content: flex-end; }
#me  { background: #95192f; justify-content: flex-start; }
#ci span  { text-align: right; }
#me span  { text-align: left; }
#rep span, #fed span { text-align: center; }

/* Fringe pills */
.fringe { font-family: "Bitter", serif; font-weight: 400; color: #fff; white-space: nowrap; }
#auth, #maj { background: rgba(0,30,62,0.88); box-shadow: 0 0 18px 4px rgba(0,30,62,0.35); }
#lib, #eq   { background: rgba(149,25,47,0.88); box-shadow: 0 0 18px 4px rgba(149,25,47,0.35); }

/* Tensional labels */
.t-vert { display: flex; flex-direction: column; align-items: flex-start; justify-content: center; }
.t-vert .the  { font-family: "Playfair Display", serif; font-style: italic; font-weight: 500; color: #001f3f; text-transform: uppercase; padding-left: 0.05em; line-height: 1.1; }
.t-vert .main { font-family: "Playfair Display", serif; font-weight: 600; color: #001f3f; text-transform: uppercase; line-height: 1.05; letter-spacing: 0.02em; white-space: nowrap; }
.t-vert .idea { font-family: "Playfair Display", serif; font-style: italic; font-weight: 500; color: #001f3f; text-transform: uppercase; line-height: 1.1; align-self: flex-end; padding-right: 0.08em; }
.t-horiz { display: flex; align-items: center; justify-content: center; font-family: "Playfair Display", serif; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; color: #9e1b32; }

/* Pulse animation for flag circle */
@keyframes pulse {
  0%   { transform: scale(1);    }
  50%  { transform: scale(1.06); }
  100% { transform: scale(1);    }
}
.pulsing { animation: pulse 2s ease-in-out infinite; }

/* Info panel */
#panel {
  display: none;
  width: 100%; margin-top: 16px;
  padding: 20px 28px;
  background: #f9f8f5;
  border-left: 4px solid #9e1b32;
  border-radius: 0 6px 6px 0;
  position: relative;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
#panel.open { display: block; }
#panel-close { position:absolute; top:12px; right:16px; cursor:pointer; background:none; border:none; font-size:1.1rem; color:#888; }
#panel-title { font-family:"Playfair Display",serif; font-weight:600; font-size:1.1rem; color:#001f3f; margin-bottom:8px; padding-right: 24px; }
#panel-body  {
  font-family:Georgia,serif; font-size:0.9rem; color:#333; line-height:1.7;
  max-height: 220px;
  overflow-y: auto;
  padding-right: 16px;
  white-space: pre-line;
  scrollbar-width: thin;
  scrollbar-color: #9e1b32 #f0ece3;
}
#panel-body::-webkit-scrollbar { width: 8px; }
#panel-body::-webkit-scrollbar-track { background: #f0ece3; border-radius: 4px; }
#panel-body::-webkit-scrollbar-thumb { background: #9e1b32; border-radius: 4px; }
#panel-body::-webkit-scrollbar-thumb:hover { background: #7a0020; }

/* Tensional labels: clickable cursor */
.t-vert, .t-horiz { cursor: pointer; }
</style>
</head>

<script>
function layout() {
  const diag = document.getElementById('diagram');
  const W = diag.offsetWidth;
  const H = diag.offsetHeight;
  const shorter = Math.min(W, H);

  const L  = shorter * 0.818;   // arrow length (both same)
  const T  = shorter * 0.0875;  // arrow thickness
  const cx = W / 2;
  const cy = H / 2;

  // ── ARROWS ──
  const blue = document.getElementById('arrow-blue');
  blue.style.width  = T + 'px';
  blue.style.height = L + 'px';
  blue.style.left   = (cx - T/2) + 'px';
  blue.style.top    = (cy - L/2) + 'px';

  const red = document.getElementById('arrow-red');
  red.style.width   = L + 'px';
  red.style.height  = T + 'px';
  red.style.left    = (cx - L/2) + 'px';
  red.style.top     = (cy - T/2) + 'px';

  const blueTop  = cy - L/2;
  const blueBot  = cy + L/2;
  const redLeft  = cx - L/2;
  const redRight = cx + L/2;

  // ── FLAG CIRCLE ──
  // Radius from Canva: circle w=355.8 in 1400px canvas = 25.4% of W
  const R = W * 0.0635;  // circle radius — half original
  const fc = document.getElementById('flag-circle');
  fc.style.width  = (R * 2) + 'px';
  fc.style.height = (R * 2) + 'px';
  fc.style.left   = (cx - R) + 'px';
  fc.style.top    = (cy - R) + 'px';
  fc.style.borderRadius = '50%';
  fc.style.objectFit = 'cover';

  // AI Bubble — same size and position as flag circle, hidden by default
  const ab = document.getElementById('ai-bubble');
  ab.style.width  = (R * 1.6) + 'px';
  ab.style.height = (R * 1.6) + 'px';
  ab.style.left   = (cx - R * 0.8) + 'px';
  ab.style.top    = (cy - R * 0.8) + 'px';
  ab.style.position = 'absolute';
  ab.style.objectFit = 'contain';

  // Center zone same size as flag circle
  const czEl = document.getElementById('center-zone');
  czEl.style.width  = (R * 2) + 'px';
  czEl.style.height = (R * 2) + 'px';
  czEl.style.left   = (cx - R) + 'px';
  czEl.style.top    = (cy - R) + 'px';
  fc.style.opacity = '1.0';
  

  // ── CARDINAL BOXES ──
  // CI has virtually no padding; its size sets all others
  const cardPad = 6;  // px, nearly zero
  const cardFs  = 14; // px font size (15 × 0.7 = 30% smaller)

  // Size all boxes with approved font, measure CI
  ['rep','fed','ci','me'].forEach(id => {
    const el = document.getElementById(id);
    el.style.padding = cardPad + 'px ' + cardPad + 'px';
    el.querySelector('span').style.fontSize = cardFs + 'px';
    el.style.width  = 'auto';
    el.style.height = 'auto';
  });

  requestAnimationFrame(() => {
    const ci = document.getElementById('ci');
    const boxW = ci.offsetWidth;
    const boxH = ci.offsetHeight;

    // Apply uniform size to all
    ['rep','fed','ci','me'].forEach(id => {
      const el = document.getElementById(id);
      el.style.width  = boxW + 'px';
      el.style.height = boxH + 'px';
    });

    // Boxes sit at the circle boundary — center of box ON the circle edge
    // Rep: top of circle (vertical axis)
    const rep = document.getElementById('rep');
    rep.style.left = (cx - boxW/2) + 'px';
    rep.style.top  = (cy - R - boxH/2) + 'px';

    // Fed: bottom of circle (vertical axis)
    const fed = document.getElementById('fed');
    fed.style.left = (cx - boxW/2) + 'px';
    fed.style.top  = (cy + R - boxH/2) + 'px';

    // CI: left of circle (horizontal axis), right edge at cx-R+boxW/4 (25% into circle)
    ci.style.left = (cx - R - boxW*0.75) + 'px';
    ci.style.top  = (cy - boxH/2) + 'px';

    // ME: right of circle, left edge at cx+R-boxW/4 (25% into circle)
    const me = document.getElementById('me');
    me.style.left = (cx + R - boxW*0.25) + 'px';
    me.style.top  = (cy - boxH/2) + 'px';
  });

  // ── FRINGE LABELS ──
  const fringeH  = T * 0.30;
  const fringeFs = shorter * 0.012;

  function styleF(el) {
    el.style.fontSize = fringeFs + 'px';
    el.style.height   = fringeH + 'px';
    el.style.padding  = '0 ' + (fringeH * 0.55) + 'px';
  }

  const auth = document.getElementById('auth');
  styleF(auth);
  auth.style.top = (blueTop + L*0.10 - fringeH/2) + 'px';
  requestAnimationFrame(() => { auth.style.left = (cx - auth.offsetWidth/2) + 'px'; });

  const maj = document.getElementById('maj');
  styleF(maj);
  maj.style.top = (blueBot - L*0.10 - fringeH/2) + 'px';
  requestAnimationFrame(() => { maj.style.left = (cx - maj.offsetWidth/2) + 'px'; });

  const lib = document.getElementById('lib');
  styleF(lib);
  lib.style.top = (cy - fringeH/2) + 'px';
  requestAnimationFrame(() => { lib.style.left = (redLeft + L*0.08) + 'px'; });

  const eq = document.getElementById('eq');
  styleF(eq);
  eq.style.top = (cy - fringeH/2) + 'px';

  const mainFs = shorter * 0.0304;
  const subFs  = shorter * 0.0144;
  const lrFs   = shorter * 0.0336;

  ['main-nat','main-dem'].forEach(id => document.getElementById(id).style.fontSize = mainFs + 'px');
  ['idea-nat','idea-dem'].forEach(id => document.getElementById(id).style.fontSize = subFs + 'px');

  const nat = document.getElementById('t-national');
  nat.style.top = '0'; nat.style.height = blueTop + 'px';
  nat.style.justifyContent = 'flex-end';
  nat.style.paddingBottom = (shorter * 0.006) + 'px';
  requestAnimationFrame(() => {

  const dem = document.getElementById('t-democratic');
  dem.style.top = blueBot + 'px'; dem.style.height = (H - blueBot) + 'px';
  dem.style.justifyContent = 'flex-start';
  dem.style.paddingTop = (shorter * 0.006) + 'px';
  requestAnimationFrame(() => {
    const mw = document.getElementById('t-democratic').querySelector('.main').scrollWidth;
    dem.style.width = mw + 'px'; dem.style.left = (cx - mw/2) + 'px';
  });

  const lib2 = document.getElementById('t-liberty');
  lib2.style.left = '0'; lib2.style.width = redLeft + 'px';
  lib2.style.top = (cy - T*2) + 'px'; lib2.style.height = (T*4) + 'px';
  lib2.style.fontSize = lrFs + 'px';

  const eq2 = document.getElementById('t-equality');
  eq2.style.left = redRight + 'px'; eq2.style.width = (W - redRight) + 'px';
  eq2.style.top = (cy - T*2) + 'px'; eq2.style.height = (T*4) + 'px';
  eq2.style.fontSize = lrFs + 'px';
}

// Center hover zone
  const cz = document.getElementById('center-zone');
  if(cz) {
    // sized in layout()
  }

window.addEventListener('load', layout);
window.addEventListener('resize', layout);

const SHADOW = {
  rep:'0 4px 22px rgba(4,31,62,0.55)', fed:'0 4px 22px rgba(4,31,62,0.55)',
  ci:'0 4px 22px rgba(149,25,47,0.55)', me:'0 4px 22px rgba(149,25,47,0.55)'
};

let locked = null; // id of currently locked element

function g(id){ return document.getElementById(id); }

// Axis membership
const VERT_CARDINALS   = ['rep','fed'];
const VERT_FRINGES     = ['auth','maj'];
const VERT_TENSIONALS  = ['national','democratic'];
const HORIZ_CARDINALS  = ['ci','me'];
const HORIZ_FRINGES    = ['lib','eq'];
const HORIZ_TENSIONALS = ['liberty','equality'];

const TENSIONAL_AXIS = { national:'vert', democratic:'vert', liberty:'horiz', equality:'horiz' };
const TENSIONAL_SIDE = {
  national:   { cardinals:['rep'], fringes:['auth'] },
  democratic: { cardinals:['fed'], fringes:['maj']  },
  liberty:    { cardinals:['ci'],  fringes:['lib']  },
  equality:   { cardinals:['me'],  fringes:['eq']   },
};

// ── RESET all elements to neutral ──
function reset() {
  ['rep','fed','ci','me'].forEach(id => {
    const el = g(id);
    el.style.opacity   = '0.5';
    el.style.boxShadow = 'none';
    el.style.filter    = '';
  });
  ['auth','maj','lib','eq'].forEach(id => {
    const el = g(id);
    el.style.opacity = '0.82';
    el.style.filter  = '';
  });
  [...VERT_TENSIONALS, ...HORIZ_TENSIONALS].forEach(id => {
    const el = g('t-' + id);
    if(el){ el.style.opacity = '1'; el.style.transform = ''; }
  });
  g('arrow-blue').style.transform = '';
  g('arrow-blue').style.transformOrigin = '';
  g('arrow-blue').style.opacity = '1';
  g('arrow-red').style.transform = '';
  g('arrow-red').style.transformOrigin = '';
  g('arrow-red').style.opacity = '1';
  g('flag-circle').classList.remove('pulsing');
  g('ai-bubble').style.opacity = '0';
}

// ── PANEL ──
function openPanel(id) {
  const d = CONTENT[id];
  if(!d) return;
  g('panel-title').textContent = d.title;
  g('panel-body').textContent  = d.body;
  g('panel').classList.add('open');
}
function closePanel() {
  // Instead of hiding, return to the default intro state
  locked = null;
  reset();
  openPanel('intro');
}
g('panel-close').addEventListener('click', closePanel);

// ── HELPER: highlight one cardinal, dim others ──
function highlightCardinal(id) {
  ['rep','fed','ci','me'].forEach(cid => {
    const el = g(cid);
    if(cid === id) {
      el.style.opacity   = '1';
      el.style.boxShadow = SHADOW[cid];
      el.style.filter    = '';
    } else {
      el.style.opacity   = '0.25';
      el.style.boxShadow = 'none';
    }
  });
}

// ── 1. FRINGE HOVER + CLICK ──
['auth','maj','lib','eq'].forEach(id => {
  const el = g(id);
  el.addEventListener('mouseenter', () => {
    if(locked) return;
    reset();
    // Stretch relevant arrow
    if(id === 'auth') {
      g('arrow-blue').style.transformOrigin = 'center bottom';
      g('arrow-blue').style.transform = 'scaleY(1.1)';
    } else if(id === 'maj') {
      g('arrow-blue').style.transformOrigin = 'center top';
      g('arrow-blue').style.transform = 'scaleY(1.1)';
    } else if(id === 'lib') {
      g('arrow-red').style.transformOrigin = 'right center';
      g('arrow-red').style.transform = 'scaleX(1.1)';
    } else if(id === 'eq') {
      g('arrow-red').style.transformOrigin = 'left center';
      g('arrow-red').style.transform = 'scaleX(1.1)';
    }
    // Fringe glows
    el.style.opacity = '1';
    // Cardinals blur
    ['rep','fed','ci','me'].forEach(cid => {
      g(cid).style.opacity = '0.2';
      g(cid).style.filter  = 'blur(1.5px)';
    });
  });
  el.addEventListener('mouseleave', () => { if(!locked) reset(); });
  el.addEventListener('click', e => {
    e.stopPropagation();
    if(locked === id) { closePanel(); return; }
    locked = id;
    openPanel(id);
  });
});

// ── 2. CENTER HOVER + CLICK (intro) ──
['center-zone','flag-circle'].forEach(cid => {
  const el = g(cid);
  if(!el) return;
  el.addEventListener('mouseenter', () => {
    if(locked) return;
    reset();
    g('flag-circle').classList.add('pulsing');
    g('ai-bubble').style.opacity = '1';
    ['rep','fed','ci','me'].forEach(id => {
      g(id).style.opacity   = '1';
      g(id).style.boxShadow = SHADOW[id];
    });
    ['auth','maj','lib','eq'].forEach(id => { g(id).style.opacity = '0.3'; });
  });
  el.addEventListener('mouseleave', () => { if(!locked) reset(); });
  el.addEventListener('click', e => {
    e.stopPropagation();
    // If something is locked, return to intro; if already on intro, do nothing
    if(locked) closePanel();
  });
});

// ── 3 & 4. CARDINAL HOVER + CLICK ──
['rep','fed','ci','me'].forEach(id => {
  const el = g(id);
  el.addEventListener('mouseenter', () => {
    if(locked) return;
    reset();
    highlightCardinal(id);
  });
  el.addEventListener('mouseleave', () => { if(!locked) reset(); });
  el.addEventListener('click', e => {
    e.stopPropagation();
    if(locked === id) { closePanel(); return; }
    locked = id;
    reset();
    highlightCardinal(id);
    openPanel(id);
  });
});

// ── 5. TENSIONAL CLICK (entire axis highlight) ──
[
  {id:'national',   el:'t-national'},
  {id:'democratic', el:'t-democratic'},
  {id:'liberty',    el:'t-liberty'},
  {id:'equality',   el:'t-equality'},
].forEach(({id, el: elId}) => {
  const el = g(elId);
  if(!el) return;
  el.addEventListener('click', e => {
    e.stopPropagation();
    const myAxis = TENSIONAL_AXIS[id]; // 'vert' or 'horiz'
    const axisKey = myAxis === 'vert' ? 'structural' : 'philosophical';

    // If already locked to this axis, return to intro
    if(locked === axisKey) { closePanel(); return; }
    locked = axisKey;
    reset();

    if(myAxis === 'horiz') {
      // Philosophical axis: highlight liberty + equality fully
      g('t-liberty').style.transform = 'scale(1.08)';
      g('t-equality').style.transform = 'scale(1.08)';
      // Highlight both cardinals on horizontal axis
      ['ci','me'].forEach(cid => {
        g(cid).style.opacity   = '1';
        g(cid).style.boxShadow = SHADOW[cid];
      });
      // Highlight both fringes on horizontal axis
      ['lib','eq'].forEach(fid => { g(fid).style.opacity = '1'; });
      // Fade vertical axis elements
      ['rep','fed'].forEach(cid => { g(cid).style.opacity = '0.2'; });
      ['auth','maj'].forEach(fid => { g(fid).style.opacity = '0.2'; });
      ['t-national','t-democratic'].forEach(tid => {
        const tel = g(tid);
        if(tel) tel.style.opacity = '0.2';
      });
      g('arrow-blue').style.opacity = '0.2';
    } else {
      // Structural axis: highlight national + democratic fully
      g('t-national').style.transform = 'scale(1.08)';
      g('t-democratic').style.transform = 'scale(1.08)';
      // Highlight both cardinals on vertical axis
      ['rep','fed'].forEach(cid => {
        g(cid).style.opacity   = '1';
        g(cid).style.boxShadow = SHADOW[cid];
      });
      // Highlight both fringes on vertical axis
      ['auth','maj'].forEach(fid => { g(fid).style.opacity = '1'; });
      // Fade horizontal axis elements
      ['ci','me'].forEach(cid => { g(cid).style.opacity = '0.2'; });
      ['lib','eq'].forEach(fid => { g(fid).style.opacity = '0.2'; });
      ['t-liberty','t-equality'].forEach(tid => {
        const tel = g(tid);
        if(tel) tel.style.opacity = '0.2';
      });
      g('arrow-red').style.opacity = '0.2';
    }

    openPanel(id);
  });
});

// ── CLICK OUTSIDE: return to intro ──
g('diagram').addEventListener('click', () => {
  if(locked) closePanel();
});

// ── INITIAL STATE: show intro by default ──
openPanel('intro');
</script>
